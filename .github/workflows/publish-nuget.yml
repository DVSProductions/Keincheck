name: Publish to NuGet

# Publishes the Keincheck library packages to NuGet.org via Trusted Publishing
# (GitHub OIDC — no stored API key). Runs on a version tag, or on demand.
#
# Requires a NuGet Trusted Publishing policy:
#   Package Owner:    <your nuget.org account/org>
#   Repository Owner: DVSProductions
#   Repository:       Keincheck
#   Workflow File:    publish-nuget.yml
#   Environment:      (leave empty)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  id-token: write   # exchange GitHub's OIDC token for a short-lived NuGet key
  contents: read

jobs:
  publish:
    # Windows runner: Keincheck.Wpf (net8.0-windows + UseWPF) only builds on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Derive version (tag runs override the csproj version)
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "arg=-p:Version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack the library packages
        shell: bash
        run: |
          for proj in Keincheck.Protocol Keincheck.Core Keincheck.Client Keincheck.Avalonia Keincheck.Wpf Keincheck; do
            dotnet pack "$proj/$proj.csproj" -c Release -o artifacts/nupkg ${{ steps.ver.outputs.arg }}
          done

      - name: NuGet login (Trusted Publishing via OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: DVSProductions   # your nuget.org account username

      - name: Push to NuGet
        # bash so the glob expands to real files — on the Windows runner the
        # default pwsh shell passes the literal wildcard through and dotnet errors.
        shell: bash
        run: |
          for pkg in artifacts/nupkg/*.nupkg; do
            echo "pushing $pkg"
            dotnet nuget push "$pkg" \
              --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --skip-duplicate
          done
